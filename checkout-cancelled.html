<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Checkout Cancelled</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f4f6f9;
        }
        .card {
            max-width: 420px;
            text-align: center;
            padding: 40px 32px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        h1 { font-size: 22px; margin: 16px 0 8px; color: #a61b1b; }
        p { color: #555; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Checkout cancelled</h1>
        <p>No payment method was saved. You can return to your terminal and try again whenever you're ready.</p>
    </div>
</body>
</html>
